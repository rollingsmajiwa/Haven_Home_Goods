<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Living | Haven Home Goods</title>
    <link rel="stylesheet" href="styles.css">
     <style>
     .product-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        padding: 40px;
     }   
     .product-grid img {
        width: 100%;
        height: 250px;
        object-fit: cover;
        
     }
    </style>
</head>
<body>
    
        <h1 style="text-align: center;margin-top: 50px;">Living Collection</h1>
        <div class="product-grid">
        <div class="product">
            <img src="assets/images/living.jpg" alt="living">
            <h3>Modern Sofa</h3>
            <p>Price: <span>Ksh. 45000</span></p>
            <button class="buy-btn">Add to Cart</button>
        </div>
        <div class="product">
            <img src="assets/images/rug.jpg" alt="">
            <h3>Woolen Rug</h3>
            <p>Price: <span>Ksh. 5000</span></p>
            <button class="buy-btn">Add to Cart</button>
                </div>
        </div>

    
</body>
</html>
