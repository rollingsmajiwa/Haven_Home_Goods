<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decor | Haven Home Goods</title>
    <link rel="stylesheet" href="styles.css">
     <style>
     .product-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        padding: 40px;
     }   
     .product-grid img {
        width: 100%;
        height: 250px;
        object-fit: cover;
        
     }
     .img-content {
    background-color: rgb(236, 235, 235);
    border: 1px solid grey;
    padding: 1rem;
    border-radius: 8px;
    transition: transform 0.3s;

}

.img-content img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 5px;
    margin-bottom: 2rem;
    
}
.img-content:hover {
    transform: translateY(-10px); border-color: gray;
}

    </style>
</head>
<body>
    
        <h1 style="text-align: center;margin-top: 50px;">Decor and Accents</h1>
        <div class="product-grid">
        <div class="product">
            <div class="img-content">
                <img src="assets/images/wall.jpg" alt="">
                <h3>Modern Wall Frame</h3>
                <p>Price: <span>Ksh. 4000</span></p>
                <button class="buy-btn">Add to Cart</button>
            </div>
        </div>
        <div class="product">
            <div class="img-content">
                <img src="assets/images/scented.jpg" alt="">
                <h3>Scented Candle</h3>
                <p>Price: <span>Ksh. 500</span></p>
                <button class="buy-btn">Add to Cart</button>
            </div>
                </div>
        </div>

    
</body>
</html>
